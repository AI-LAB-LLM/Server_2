<!DOCTYPE html>
{% load static %}
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Device Dashboard – {{ device_id }}</title>
  <link rel="stylesheet" href="{% static 'ppg/css/dashboard.css' %}">
  <script src="https://cdn.canvasjs.com/canvasjs.min.js"></script>
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    #appRoot { display:flex; flex-direction:column; height:100vh; overflow:hidden; }
    .header { flex:0 0 auto; }
    .meta-bar { display:flex; gap:12px; align-items:center; margin:6px 20px 0; flex:0 0 auto; }
    .pill { background:#f3f4f6; padding:4px 10px; border-radius:999px; font-size:12px; }
    .kpis { flex:0 0 auto; padding:6px 20px; display:flex; gap:16px; align-items:center; }
    .kpi { display:flex; flex-direction:column; }
    .kpi-label { font-size:11px; color:#6b7280; }
    .kpi-value { font-size:15px; font-weight:700; color:#111827; }
    .grid-split {
      display:grid;
      grid-template-columns: minmax(0,1fr) minmax(0,1.8fr);
      gap:14px; padding:8px 20px 12px;
      flex:1; min-height:0; align-items:stretch;
    }
    .grid-left  { display:flex; flex-direction:column; gap:10px; min-height:0; }
    .grid-right { display:flex; flex-direction:column; min-height:0; }
    .grid-right .card { flex:1; min-height:0; display:flex; flex-direction:column; padding:10px; }
    .chart-box { flex:1; min-height:0; width:100%; }
    .card { background:#fff; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.08); }
    .imu-section { padding:8px 14px; }
    .imu-title  { font-weight:700; font-size:12px; margin-bottom:4px; color:#374151; }
    .imu-value  { display:flex; align-items:baseline; gap:6px; flex-wrap:wrap; }
    .imu-level  { font-size:18px; font-weight:800; }
    .imu-danger { font-size:12px; font-weight:600; }
    .imu-ts     { font-size:11px; color:#6b7280; }
    #wearCard {
      flex:1; display:flex; flex-direction:column; padding:16px;
      box-sizing:border-box; text-align:center; min-height:0;
    }
    #wearCard .wear-card__top    { flex:0 0 auto; }
    #wearCard .wear-card__bottom {
      flex:1; display:flex; align-items:center; justify-content:center;
      overflow:hidden; padding:8px 0; min-height:0;
    }
    #wearCard .wear-card__bottom > img { max-height:100%; max-width:100%; object-fit:contain; }
    .wear-card__title  { font-size:12px; color:#6b7280; font-weight:600; margin-bottom:4px; }
    .wear-card__status { font-size:24px; font-weight:700; margin-bottom:4px; }
    .wear-card__meta   { font-size:10px; color:#4b5563; }
    #wearCard.is-wear .wear-card__status { color:#10b981; }
    #wearCard.is-off  .wear-card__status { color:#ef4444; }
    #wearCard.is-unk  .wear-card__status { color:#9ca3af; }
  </style>
</head>
<body>
<div id="appRoot">
  <header class="header">
    <h1>Integrated Threat Monitor</h1>
    <img class="logo" src="{% static 'ppg/image/logo.png' %}" alt="logo">
  </header>

  <div class="meta-bar">
    <div class="pill"><b>User</b>: {{ protectee_name }}</div>
    <div class="pill"><b>Device</b>: {{ device_id }}</div>
  </div>

  <div class="kpis">
    <div class="kpi">
      <span class="kpi-label">Baseline</span>
      <span class="kpi-value" id="kpiBaseline">대기 중...</span>
    </div>
    <div class="kpi">
      <span class="kpi-label">데이터 지연</span>
      <span class="kpi-value" id="delayText">-</span>
    </div>
  </div>

  <div class="grid-split">
    <div class="grid-left">
      <div class="card imu-section">
        <div class="imu-title">IMU 상태 (최근 3분)</div>
        <div class="imu-value">
          <div id="imuLevelText"   class="imu-level">-</div>
          <div id="imuDangerLevel" class="imu-danger"></div>
          <div id="imuTs"          class="imu-ts"></div>
        </div>
      </div>

      <div id="wearCard" class="card wear-card is-unk" style="flex:1;">
        <div class="wear-card__top">
          <div class="wear-card__title">탈부착 여부</div>
          <div class="wear-card__status" id="wearStatusText">--</div>
          <div class="wear-card__meta"   id="wearStatusMeta"></div>
        </div>
        <div class="wear-card__bottom">
          <img id="wearStateImage"
               src="{% static 'ppg/image/loading.png' %}"
               alt="wear state">
        </div>
      </div>
    </div>

    <div class="grid-right">
      <div class="card">
        <div id="irHoldingChart" class="chart-box"></div>
        <p id="irHoldingMeta" class="decision"></p>
      </div>
    </div>
  </div>
</div>

{{ items|json_script:"items-json" }}
<script>
  window.ITEMS          = JSON.parse(document.getElementById('items-json').textContent || '[]');
  window.DASH_DEVICE_ID = "{{ device_id|escapejs }}";
</script>
<script type="module" src="{% static 'ppg/js/main_device.js' %}"></script>
</body>
</html>
