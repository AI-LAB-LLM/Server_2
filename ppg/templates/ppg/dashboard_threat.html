<!DOCTYPE html>
{% load static %}
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Threat Window Dashboard – {{ device_id }}</title>
  <link rel="stylesheet" href="{% static 'ppg/css/dashboard.css' %}">
  <script src="https://cdn.canvasjs.com/canvasjs.min.js"></script>
  <style>
    html, body { margin:0; padding:0; }
    .meta-bar { display:flex; gap:12px; align-items:center; margin:12px 20px; }
    .pill { background:#f3f4f6; padding:4px 10px; border-radius:999px; font-size:12px; }
    .grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      padding:8px 20px 20px;
    }
    .card { background:#fff; border-radius:12px; box-shadow:0 4px 12px rgba(0,0,0,.08); padding:14px; }
    .chart-box { width:100%; height:380px; }
    #threatMeta { font-size:12px; color:#4b5563; margin-top:8px; }
  </style>
</head>
<body>
  <header class="header">
    <h1>Threat Window Monitor</h1>
  </header>

  <div class="meta-bar">
    <div class="pill"><b>User</b>: {{ protectee_name }}</div>
    <div class="pill"><b>Device</b>: {{ device_id }}</div>
  </div>

  <div class="grid">
    <div class="card">
      <div id="threatPpgChart" class="chart-box"></div>
    </div>
    <div class="card">
      <div id="threatImuChart" class="chart-box"></div>
    </div>
  </div>

  <p id="threatMeta" style="margin:0 20px;"></p>

  <script>
    window.THREAT_DEVICE_ID = "{{ device_id|escapejs }}";
  </script>
  <script type="module" src="{% static 'ppg/js/threat_main.js' %}"></script>
</body>
</html>
